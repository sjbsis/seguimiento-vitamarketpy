services:
  seguimiento-web:
    build: ./app
    container_name: seguimiento-web
    restart: unless-stopped
    environment:
      - DB_HOST=172.18.0.8
      - DB_PORT=5432
      - DB_NAME=default
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - JWT_SECRET=vita_seguimiento_secret_2026
      - PORT=3000
    networks:
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.seguimiento.rule=Host(`seguimiento.vitamarketpy.com`)"
      - "traefik.http.routers.seguimiento.entrypoints=websecure"
      - "traefik.http.routers.seguimiento.tls.certresolver=letsencrypt"
      - "traefik.http.services.seguimiento.loadbalancer.server.port=3000"

networks:
  traefik-net:
    external: true
